<!DOCTYPE html >

<html xmlns="http://www.w3.org/1999/xhtml" >
<head>
    <title>Simple XHTML Page</title>
</head>

<body>

    <h1>Welcome guys</h1>

    <p>YOU ALL ARE WELCOMED  </p>

    <h2>Features of XHTML:</h2>
    <ul>
        <li>All tags are properly closed</li>
        <li>Tags are written in lowercase</li>
        <li>Attributes are quoted</li>
        <li>Proper nesting of elements</li>
    </ul>

    <h2>Sample Link</h2>
    <p>
        <a href="https://www.google.com">Visit Google</a>
    </p>

    <h2>Image Example</h2>
    <p>
        <img src="https://via.placeholder.com/150" alt="Sample Image" />
    </p>

    <h2>Form Example</h2>
    <form action="#">
        <p>
            <label for="name">Name:</label><br />
            <input type="text" id="name" name="name" />
        </p>

        <p>
            <label for="email">Email:</label><br />
            <input type="text" id="email" name="email" />
        </p>

        <p>
            <input type="submit" value="Submit" />
        </p>
    </form>

</body>
</html>
